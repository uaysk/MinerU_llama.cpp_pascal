services:
  mineru-api:
    image: mineru:latest
    container_name: mineru-api
    restart: always
    profiles: ["api"]
    ports:
      - 8001:8000
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-huggingface}
      MINERU_DEFAULT_BACKEND: ${MINERU_DEFAULT_BACKEND:-vlm-http-client}
      MINERU_OPENAI_SERVER_URL: ${MINERU_OPENAI_SERVER_URL:-https://litellm.uaysk.com}
      MINERU_VL_SERVER: ${MINERU_VL_SERVER:-https://litellm.uaysk.com}
      MINERU_VL_MODEL_NAME: ${MINERU_VL_MODEL_NAME:-mineru2.5}
      MINERU_VL_API_KEY: ${MINERU_VL_API_KEY:-}
    entrypoint: mineru-api
    command:
      --host 0.0.0.0
      --port 8000
      # Requests default to MINERU_DEFAULT_BACKEND and MINERU_OPENAI_SERVER_URL.
      # Override them per request if you want to use another backend or server.
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]  # Modify for multiple GPUs: ["0", "1"]
              capabilities: [gpu]

  mineru-gradio:
    image: mineru:latest
    container_name: mineru-gradio
    restart: always
    profiles: ["gradio"]
    ports:
      - 7860:7860
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-huggingface}
      MINERU_DEFAULT_BACKEND: ${MINERU_DEFAULT_BACKEND:-vlm-http-client}
      MINERU_OPENAI_SERVER_URL: ${MINERU_OPENAI_SERVER_URL:-https://litellm.uaysk.com}
      MINERU_VL_SERVER: ${MINERU_VL_SERVER:-https://litellm.uaysk.com}
      MINERU_VL_MODEL_NAME: ${MINERU_VL_MODEL_NAME:-mineru2.5}
      MINERU_VL_API_KEY: ${MINERU_VL_API_KEY:-}
    entrypoint: mineru-gradio
    command:
      --server-name 0.0.0.0
      --server-port 7860
      --enable-http-client true
      # --enable-api false  # If you want to disable the API, set this to false
      # --max-convert-pages 20  # If you want to limit the number of pages for conversion, set this to a specific number
      # The default server URL shown in the UI comes from MINERU_OPENAI_SERVER_URL.
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]  # Modify for multiple GPUs: ["0", "1"]
              capabilities: [gpu]
